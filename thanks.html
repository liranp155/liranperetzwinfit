<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה! | לירן פרץ</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #0a0a0a;
      color: #fff;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { max-width: 500px; padding: 40px 24px; }
    .icon { font-size: 72px; margin-bottom: 24px; }
    h1 { font-size: 42px; font-weight: 900; margin-bottom: 14px; }
    p { color: #aaa; font-size: 17px; line-height: 1.7; margin-bottom: 36px; }
    a {
      display: inline-block;
      padding: 13px 36px;
      background: #00d4ff;
      color: #000;
      font-weight: 700;
      font-size: 15px;
      border-radius: 4px;
      text-decoration: none;
    }
    a:hover { background: #00a8cc; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">💪</div>
    <h1>תודה!</h1>
    <p>קיבלתי את הפנייה שלך ואחזור אליך בהקדם האפשרי.</p>
    <a href="index.html">חזרה לאתר</a>
  </div>
</body>
</html>
